<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <title>Formulário</title>
</head>
<body>
<div class="container">
    <h1>Adicionar comentários usando DOM</h1>
    <div>
        <form id="commentForm">
            <h2>Queres deixar um comentário?</h2>
            <div class="mb-3">
                <label for="nameInput" class="form-label">Nome</label>
                <input type="text" class="form-control" id="nameInput" placeholder="Nome">
                <div class="invalid-feedback">
                Por favor, insira o seu nome.
                </div>
            </div>
            <div class="mb-3">
                <label for="emailInput" class="form-label">E-mail</label>
                <input type="email" class="form-control" id="emailInput" placeholder="E-mail">
                <div class="invalid-feedback">
                Por favor, insira um email
                </div>
            </div>
            <div class="mb-3">
                <label for="messageTextarea" class="form-label">Mensagem</label>
                <textarea name="messages" class="form-control" id="messageTextarea" rows="4"
                placeholder="Mensagem"></textarea>
                <div class="invalid-feedback">
                Por favor, insira uma mensagem
                </div>
            </div>
            <button class="btn btn-primary" id="submitButton">Submeter Comentário</button>
        </form>
    </div>
    <h2 class="mt-4">Comentários</h2>
    <div id="commentsSection" class="mt-3">

    </div>
</div>
<script src="../public/JS/form.js"></script>
</body>
</html>
